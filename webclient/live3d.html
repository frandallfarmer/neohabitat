<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1040" />
    <title>NeoHabitat 3D</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Same importmap + #app shell as live.html — the 3D client is the same app-shell with a
         different renderer adapter. Three.js is loaded by render3d-adapter.js via a relative path
         (passed into createScene), so it needs no import-map entry. -->
    <script type="importmap">
        {
            "imports": {
                "htm": "./vendor/htm.mjs",
                "preact": "./vendor/preact.mjs",
                "preact/hooks": "./vendor/hooks.mjs",
                "@preact/signals-core": "./vendor/signals-core.mjs",
                "@preact/signals": "./vendor/signals.mjs"
            }
        }
    </script>
    <script type="module" src="./lib/live3d.js"></script>
</head>
<body style="background: #000;">
    <div id="app" style="display: flex; flex-direction: column; gap: 10px; padding: 2px 12px 12px;"></div>
</body>
</html>
