<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeoHabitat 3D (diorama)</title>
    <!-- Same specifiers the shared libs (region.js, avatar-chore.js, presentation.js …) import.
         Three is loaded by live3d.js via a relative path and passed in, so it needs no mapping. -->
    <script type="importmap">
        {
            "imports": {
                "htm": "./vendor/htm.mjs",
                "preact": "./vendor/preact.mjs",
                "preact/hooks": "./vendor/hooks.mjs",
                "@preact/signals-core": "./vendor/signals-core.mjs",
                "@preact/signals": "./vendor/signals.mjs"
            }
        }
    </script>
    <style>
        html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
        #scene { display: block; width: 100vw; height: 100vh; touch-action: none; image-rendering: pixelated; }
        #status3d {
            position: fixed; left: 8px; bottom: 8px; z-index: 10;
            font: 12px/1.4 monospace; color: #9fe; background: rgba(0,0,0,.55);
            padding: 4px 8px; border-radius: 4px; pointer-events: none; max-width: 90vw;
        }
    </style>
    <script type="module" src="./lib/live3d.js"></script>
</head>
<body>
    <canvas id="scene"></canvas>
    <div id="status3d">loading…</div>
</body>
</html>
