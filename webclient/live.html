<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Prescale to the 960px game width so mobile browsers fit the whole client on load; desktop
         ignores viewport width. Same entry as index.html — both ./ and ./live.html run the client. -->
    <meta name="viewport" content="width=960" />
    <title>NeoHabitat</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
        {
            "imports": {
                "htm": "./vendor/htm.mjs",
                "preact": "./vendor/preact.mjs",
                "preact/hooks": "./vendor/hooks.mjs",
                "@preact/signals-core": "./vendor/signals-core.mjs",
                "@preact/signals": "./vendor/signals.mjs"
            }
        }
    </script>
    <script type="module" src="./lib/live.js"></script>
</head>
<body>
    <!-- The C64 title sequence (lib/title.js) shows here first while the heavy client loads in
         the background; "press any key" swaps it for the live client. See lib/live.js boot(). -->
    <div id="app" style="display: flex; flex-direction: column; gap: 10px; padding: 12px;"></div>
</body>
</html>
