<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Prescale to the widest the client gets (open-terrain region frame: 960 game + 34px edge
         chevron each side ≈ 1028, rounded to the #app max-width 1040) so mobile fits the whole
         client with nothing clipped; desktop ignores viewport width. Same entry as index.html. -->
    <meta name="viewport" content="width=1040" />
    <title>NeoHabitat</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
        {
            "imports": {
                "htm": "./vendor/htm.mjs",
                "preact": "./vendor/preact.mjs",
                "preact/hooks": "./vendor/hooks.mjs",
                "@preact/signals-core": "./vendor/signals-core.mjs",
                "@preact/signals": "./vendor/signals.mjs"
            }
        }
    </script>
    <script type="module" src="./lib/live.js"></script>
</head>
<body style="background: #000;">
    <!-- The C64 title sequence (lib/title.js) shows here first while the heavy client loads in
         the background; "press any key" swaps it for the live client. See lib/live.js boot(). -->
    <!-- Small top padding (vs 12px sides/bottom) lifts the game + keyboard a few px so a row of the
         black surround shows below the keyboard instead of the kb sitting flush on the frame edge. -->
    <div id="app" style="display: flex; flex-direction: column; gap: 10px; padding: 2px 12px 12px;"></div>
</body>
</html>
