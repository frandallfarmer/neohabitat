<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Prescale the whole app to the WIDEST the client gets: an open-terrain region frame is the
         960px game (320 * Scale 3) plus a 34px edge chevron on each side ≈ 1028px, rounded up to
         the #app max-width 1040. Declaring the viewport width AS 1040 makes mobile browsers scale
         the whole client (game, chevrons, keyboard) to fit the device with nothing clipped — and
         since game + keyboard are center-aligned, the keyboard sits right under the game. Desktop
         browsers ignore viewport width and render the 1040 layout normally. -->
    <meta name="viewport" content="width=1040" />
    <title>NeoHabitat</title>
    <link rel="stylesheet" href="style.css" />
    <!--
      No build step. Native ES modules + importmap + vendored deps, served static —
      the same shape as neohabitat-doc/inspector and habisound. See DESIGN.md.
      index.html and live.html are the same live-client entry, so both ./ and
      ./live.html run the client.
    -->
    <script type="importmap">
        {
            "imports": {
                "htm": "./vendor/htm.mjs",
                "preact": "./vendor/preact.mjs",
                "preact/hooks": "./vendor/hooks.mjs",
                "@preact/signals-core": "./vendor/signals-core.mjs",
                "@preact/signals": "./vendor/signals.mjs"
            }
        }
    </script>
    <script type="module" src="./lib/live.js"></script>
</head>
<body>
    <!-- The C64 title sequence (lib/title.js) shows here first while the heavy client loads in
         the background; entering an avatar name swaps it for the live client. See lib/live.js boot(). -->
    <div id="app" style="display: flex; flex-direction: column; gap: 10px; padding: 12px;"><noscript>This client requires JavaScript.</noscript></div>
</body>
</html>
