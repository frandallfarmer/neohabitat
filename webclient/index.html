<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Prescale the whole app to the game display width. The client is laid out at a fixed 960px
         (320 * Scale 3 — the in-game region width, matched by the SCALE=3 title), so declaring the
         viewport width AS 960 makes mobile browsers scale the page to fit the device width: the
         whole thing fits on load, no pinch and no fragile zoom-to-focused-field. Desktop browsers
         ignore viewport width and render the 960px layout normally. The full-width avatar-name
         input additionally keeps focusing it from zooming in past this fit. -->
    <meta name="viewport" content="width=960" />
    <title>NeoHabitat — Web Client</title>
    <link rel="stylesheet" href="style.css" />
    <!--
      No build step. Native ES modules + importmap + vendored deps, served static —
      the same shape as neohabitat-doc/inspector and habisound. See DESIGN.md.
      The vendored Preact/htm/signals are copied from the inspector so the Phase 1
      renderer (region.js/render.js) imports the exact same module instances.
    -->
    <script type="importmap">
        {
            "imports": {
                "htm": "./vendor/htm.mjs",
                "preact": "./vendor/preact.mjs",
                "preact/hooks": "./vendor/hooks.mjs",
                "@preact/signals-core": "./vendor/signals-core.mjs",
                "@preact/signals": "./vendor/signals.mjs"
            }
        }
    </script>
    <script type="module" src="./app.js"></script>
</head>
<body>
    <div id="app"><noscript>This client requires JavaScript.</noscript></div>
</body>
</html>
