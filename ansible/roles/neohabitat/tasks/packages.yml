---
# ── Docker (idempotent — `the made` already has it) ──────────────────
- name: Ensure Docker apt key directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker apt repository
  # Use copy rather than apt_repository: the latter appends new lines to
  # an existing file when signed-by paths differ, leading to "Conflicting
  # values set for option Signed-By" errors. copy makes the file exactly
  # what we want, idempotently.
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    mode: "0644"
    content: |
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
  notify: Apt cache refresh

- name: Install Docker engine + compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - docker-buildx-plugin
    state: present

- name: Ensure docker service is enabled and running
  systemd:
    name: docker
    enabled: true
    state: started

- name: Add neohabitat user to docker group
  user:
    name: "{{ neohabitat_owner }}"
    groups: docker
    append: true

# ── Docker housekeeping (prevent disk exhaustion from dangling images
#    and unbounded logs/build cache; see issue #495) ──────────────────
- name: Ensure /etc/docker exists
  file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker daemon log rotation and build cache GC
  copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "builder": {
          "gc": {
            "enabled": true,
            "defaultKeepStorage": "1GB"
          }
        }
      }
  notify: Restart docker

- name: Install docker-prune service (weekly image/cache/volume cleanup)
  copy:
    dest: /etc/systemd/system/docker-prune.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prune dangling Docker images, build cache, and orphaned volumes
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/docker system prune -f
      ExecStart=/usr/bin/docker volume prune -f
  notify: Reload systemd

- name: Install docker-prune weekly timer
  copy:
    dest: /etc/systemd/system/docker-prune.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Weekly docker-prune

      [Timer]
      OnCalendar=weekly
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Flush handlers so docker-prune.timer unit exists before enabling
  meta: flush_handlers

- name: Enable and start docker-prune timer
  systemd:
    name: docker-prune.timer
    enabled: true
    state: started

# ── CRIU (live migration for bridge_v2) ──────────────────────────────
# criu was dropped from Ubuntu 24.04+ noble apt repos (upstream FTBFS).
# Build from source pinned to v{{ criu_version }}; bump criu_version in
# defaults/main.yml to upgrade. Binary lands at /usr/local/sbin/criu.
- name: Check installed criu version
  shell: criu --version 2>/dev/null || true
  register: criu_installed
  changed_when: false
  check_mode: false

- name: Build & install criu from source
  when: "'Version: ' + criu_version not in (criu_installed.stdout | default(''))"
  block:
    - name: Install criu build dependencies
      apt:
        name:
          - build-essential
          - pkg-config
          - libprotobuf-dev
          - libprotobuf-c-dev
          - protobuf-c-compiler
          - protobuf-compiler
          - python3-protobuf
          - libnl-3-dev
          - libnet-dev
          - libcap-dev
          - libbsd-dev
          - libnftables-dev
          - libgnutls28-dev
          - python3-future
          - uuid-dev
        state: present

    - name: Clone criu source at v{{ criu_version }}
      git:
        repo: https://github.com/checkpoint-restore/criu.git
        dest: /usr/local/src/criu
        version: "v{{ criu_version }}"

    - name: Clean prior criu build artifacts
      command: make mrproper
      args:
        chdir: /usr/local/src/criu
      changed_when: true

    - name: Build criu
      command: make -j{{ ansible_processor_vcpus | default(2) }}
      args:
        chdir: /usr/local/src/criu
      changed_when: true

    - name: Install criu binary (make install-criu → /usr/local/sbin/criu)
      command: make install-criu
      args:
        chdir: /usr/local/src/criu
      changed_when: true

# ── NodeSource Node 20 ───────────────────────────────────────────────
- name: Add NodeSource GPG key
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"
    force: false

- name: Add NodeSource apt repository
  copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ nodesource_node_major }}.x {{ nodesource_distro }} main
  notify: Apt cache refresh

- name: Install Node.js from NodeSource (major {{ nodesource_node_major }})
  apt:
    name: nodejs
    state: present

# ── Kernel module sanity for TCP_REPAIR ──────────────────────────────
# bridge_v2's tableflip → child process uses TCP_REPAIR to restore active
# sockets. tcp_diag/inet_diag must be loaded; on Ubuntu cloud images
# they autoload, but on minimal images they don't.
- name: Ensure tcp_diag/inet_diag are loaded
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - tcp_diag
    - inet_diag

- name: Persist tcp_diag/inet_diag autoload across reboots
  copy:
    dest: /etc/modules-load.d/neohabitat-bridge.conf
    mode: "0644"
    content: |
      # Required by bridge_v2 TCP_REPAIR socket handover.
      tcp_diag
      inet_diag
