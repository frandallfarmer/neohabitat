---
# Microsoft Azure Linux Agent + Hyper-V daemons + cloud-init Azure DS.
# The role is a no-op when host_is_azure is false.

worldsaway_packages:
  - walinuxagent
  - cloud-init
  - linux-cloud-tools-virtual
  - linux-tools-virtual

worldsaway_services:
  - walinuxagent
  - walinuxagent-network-setup
  - hv-kvp-daemon
  - hv-fcopy-daemon
  - hv-vss-daemon

# Knobs that match what `the made` runs in production. Override per-host
# if a future Azure VM needs different settings.
waagent_provisioning_enabled: "n"
waagent_extensions_enabled: "y"
waagent_use_cloudinit: "y"
waagent_resource_disk_format: "n"
waagent_resource_disk_filesystem: ext4
waagent_resource_disk_mountpoint: /mnt
waagent_resource_disk_enable_swap: "n"
waagent_lb_probe_responder: "y"
waagent_logs_verbose: "n"
waagent_os_enable_firewall: "y"
waagent_ssh_host_key_pair_type: rsa
waagent_regenerate_ssh_host_key: "n"
