---
# ── Repo / deployment ────────────────────────────────────────────────
neohabitat_repo_url: https://github.com/frandallfarmer/neohabitat
neohabitat_repo_path: /opt/neohabitat
neohabitat_git_ref: master
neohabitat_owner: themade
neohabitat_group: themade

# ── SSH keys for the `themade` account ───────────────────────────────
# `exclusive: false` is set in the role so adding/removing entries here
# is non-destructive of any other key already on the box. The Azure
# generated key is captured verbatim so a fresh-build host gets it back.
themade_authorized_keys:
  - name: generated-by-azure
    key: "ssh-rsa  generated-by-azure"
  - name: steve@heathaze
    key: "ssh-rsa  steve@heathaze.local"

# ── Bridge_v2 deploy ──────────────────────────────────────────────────
# Modes:
#   adopt-cutover  — first run on a host that still has the old Node
#                    bridge fronting :1337. Recreates elko with
#                    SHOULD_RUN_BRIDGE=false and binds bridge_v2 to :1337.
#                    One-shot. ~5s gap on host :1337; existing C64
#                    sessions through the old bridge will drop.
#   upgrade        — steady-state. Re-builds binary, syncs, SIGHUPs.
#                    Active sessions survive via tableflip + TCP_REPAIR.
#   refresh-only   — converge config/units, no SIGHUP.
bridge_deploy_mode: upgrade

# Where on the controller the Go toolchain lives. The bridge_v2 binary
# is built locally for linux/amd64 and shipped — we never install Go on
# the production host.
go_build_dir: "{{ playbook_dir }}/../../bridge_v2"
bridge_bin_relpath: volumes/bridge_v2_bin/bridge_v2

# ── Azure / WorldsAway ────────────────────────────────────────────────
# Set host_is_azure: false in inventory for non-Azure hosts to skip
# the worldsaway role.
host_is_azure: false
