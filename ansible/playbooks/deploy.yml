---
# Steady-state deploy: pull the latest GHCR images, then surgically
# update each service:
#   - bridge_v2: extract the new binary from the pulled bridge image,
#     atomically replace /opt/neohabitat/bin/bridge_v2 on the host,
#     `systemctl reload bridge_v2`. tableflip + TCP_REPAIR preserve
#     active sessions across the re-exec. The bridge runs as a host
#     systemd service (NOT in docker) so tableflip's PID-changing
#     fork+exec doesn't kill its own container.
#   - everyone else: `docker compose up -d` only on those services,
#     which recreates only when their image digest actually changed.
#
# Used by the build-and-push GitHub Actions workflow on master push,
# after the build matrix succeeds.

- name: Deploy latest GHCR images to neohabitat hosts
  hosts: neohabitat_servers
  gather_facts: true
  any_errors_fatal: true
  vars:
    bridge_image: "ghcr.io/{{ ghcr_image_owner | default('frandallfarmer') }}/neohabitat-bridge:latest"
    # Where the host systemd service expects the binary. Must match
    # bridge_host_binary_path in roles/bridge_host/defaults/main.yml.
    bridge_host_install_dir: /opt/neohabitat/bin
    bridge_host_binary_path: "{{ bridge_host_install_dir }}/bridge_v2"
    # Picked up from the runner's env. Multi-line secrets via -e are
    # fragile (newlines mangle); env-var lookup avoids that entirely.
    monitoring_env: "{{ lookup('env', 'MONITORING_ENV') | default('', true) }}"
    # Single-value: the Anthropic API key sage uses for LLM calls.
    anthropic_api_key: "{{ lookup('env', 'ANTHROPIC_API_KEY') | default('', true) }}"
  tasks:
    # If somebody has been hand-editing files on the box (the made has
    # historically lived this way), `ansible.builtin.git` with force=false
    # refuses to overwrite. force=true alone would silently nuke the
    # changes. Instead: snapshot anything dirty onto a saved-<UTC>
    # branch first, then pull cleanly.
    - name: Check for local modifications in the deploy repo
      command: git status --porcelain
      args:
        chdir: "{{ neohabitat_repo_path }}"
      register: deploy_repo_dirty
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ neohabitat_owner }}"

    - name: Snapshot local modifications to a saved-<UTC> branch
      shell: |
        set -euo pipefail
        branch="saved-$(date -u +%Y%m%dT%H%M%SZ)"
        echo "Saving local mods to ${branch}"
        git checkout -b "${branch}"
        git add -A
        git -c user.email='deploy@themade' -c user.name='ansible-deploy' \
          commit -m "auto-saved local modifications before deploy"
        # Hop back to the deploy ref so the next git task can fast-forward.
        # Use -f because a partially applied checkout could otherwise refuse.
        git checkout -f "{{ neohabitat_git_ref }}"
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      when:
        - deploy_repo_dirty.stdout is defined
        - deploy_repo_dirty.stdout | length > 0
      become: true
      become_user: "{{ neohabitat_owner }}"

    - name: Pull latest repo (so new compose files are present)
      git:
        repo: "{{ neohabitat_repo_url }}"
        dest: "{{ neohabitat_repo_path }}"
        version: "{{ neohabitat_git_ref }}"
        update: true
        # Safe to force: any local diffs were branched off in the
        # snapshot task above. force=false here just made the deploy
        # fail loudly every time someone edited a file on the host.
        force: true
      become: true
      become_user: "{{ neohabitat_owner }}"

    - name: Login to GHCR (only when packages are still private)
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_token }}"
      become: true
      when:
        - ghcr_username is defined
        - ghcr_token is defined
        - ghcr_token | length > 0

    # ── monitoring credentials (Grafana Cloud OTLP + Loki) ───────────
    # The MONITORING_ENV secret is the literal contents of the .env file
    # (multi-line, one VAR=value per line). When unset, leave any
    # existing file alone — sidecars will keep using whatever's there or
    # log loudly if it's missing.
    - name: Ensure /etc/neohabitat directory
      file:
        path: /etc/neohabitat
        state: directory
        owner: "{{ neohabitat_owner }}"
        group: "{{ neohabitat_group }}"
        mode: "0750"
      become: true
      when: >
        (monitoring_env is defined and monitoring_env | length > 0) or
        (anthropic_api_key is defined and anthropic_api_key | length > 0)

    - name: Write /etc/neohabitat/monitoring.env from CI secret
      copy:
        dest: /etc/neohabitat/monitoring.env
        content: "{{ monitoring_env }}"
        owner: "{{ neohabitat_owner }}"
        group: "{{ neohabitat_group }}"
        mode: "0600"
      become: true
      when: monitoring_env is defined and monitoring_env | length > 0
      register: monitoring_env_file
      no_log: true   # don't leak secrets into job logs

    # ── bots credentials (sage's Anthropic key + future bot keys) ─────
    - name: Write /etc/neohabitat/bots.env from CI secret
      copy:
        dest: /etc/neohabitat/bots.env
        content: |
          ANTHROPIC_API_KEY={{ anthropic_api_key }}
        owner: "{{ neohabitat_owner }}"
        group: "{{ neohabitat_group }}"
        mode: "0600"
      become: true
      when: anthropic_api_key is defined and anthropic_api_key | length > 0
      register: bots_env_file
      no_log: true

    - name: Pull latest compose images
      community.docker.docker_compose_v2:
        project_src: "{{ neohabitat_repo_path }}"
        files: "{{ neohabitat_compose_files }}"
        pull: always
        state: present
      become: true
      changed_when: false

    # ── bridge_v2 hot-swap ────────────────────────────────────────────
    # bridge_v2 lives on the HOST as a systemd service, not in docker.
    # tableflip's parent forks a child and exits — Docker treats PID 1
    # exit as container death (and kills the new child along with it),
    # so the in-container path was structurally broken. On the host,
    # tableflip works as designed: SIGHUP, fork, child takes over via
    # TCP_REPAIR, parent exits, systemd doesn't care because PID 1 is
    # systemd itself.
    #
    # Deploy flow:
    #   1. Extract /bridge_v2 from the new GHCR image to a .new path.
    #   2. Compare checksums — skip the dance if unchanged.
    #   3. Atomic mv into the path systemd's ExecStart points at.
    #   4. systemctl reload bridge_v2 → ExecReload sends SIGHUP →
    #      tableflip re-execs; sessions survive.

    - name: Ensure bridge_v2 install directory exists
      file:
        path: "{{ bridge_host_install_dir | default('/opt/neohabitat/bin') }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Pull latest bridge_v2 image from GHCR
      # Explicit pull because the bridge_v2 service is no longer in
      # docker-compose.yml (it runs as a host systemd service since
      # 35c554d7), so the "Pull latest compose images" task above does
      # NOT touch this image. Without this pull, `docker create` below
      # uses whatever's stale in the local cache — and on a host that
      # ran the old compose-bridge layout, that cache holds a binary
      # from before the multi-listen + sd_notify refactor. Result was
      # the deploy installing a broken old binary, the systemd unit
      # dying immediately, and "Wait for bridge_v2 to accept
      # connections" timing out on 1337/1986.
      command: docker pull {{ bridge_image }}
      become: true
      register: bridge_image_pull
      changed_when: "'Downloaded newer image' in bridge_image_pull.stdout or 'Image is up to date' not in bridge_image_pull.stdout"

    - name: Extract bridge_v2 binary from the new GHCR image
      shell: |
        set -euo pipefail
        cid=$(docker create {{ bridge_image }})
        trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
        docker cp "$cid:/bridge_v2" {{ bridge_host_binary_path | default('/opt/neohabitat/bin/bridge_v2') }}.new
      args:
        executable: /bin/bash   # need pipefail; default /bin/sh is dash on Ubuntu
      become: true
      changed_when: false

    - name: Compute checksums of current and new bridge_v2 binaries
      stat:
        path: "{{ item }}"
        checksum_algorithm: sha256
      loop:
        - "{{ bridge_host_binary_path | default('/opt/neohabitat/bin/bridge_v2') }}"
        - "{{ bridge_host_binary_path | default('/opt/neohabitat/bin/bridge_v2') }}.new"
      register: bv2_stats
      become: true

    - name: Decide whether bridge_v2 needs a reload
      set_fact:
        bv2_binary_changed: "{{ (bv2_stats.results[0].stat.checksum | default('')) != (bv2_stats.results[1].stat.checksum | default('')) }}"

    - name: Atomically replace bridge_v2 binary (only if changed)
      command: mv -f "{{ bridge_host_binary_path | default('/opt/neohabitat/bin/bridge_v2') }}.new" "{{ bridge_host_binary_path | default('/opt/neohabitat/bin/bridge_v2') }}"
      become: true
      when: bv2_binary_changed
      changed_when: true

    - name: Drop staged binary if no change
      file:
        path: "{{ bridge_host_binary_path | default('/opt/neohabitat/bin/bridge_v2') }}.new"
        state: absent
      become: true
      when: not bv2_binary_changed

    - name: Ensure bridge_v2 binary perms
      file:
        path: "{{ bridge_host_binary_path | default('/opt/neohabitat/bin/bridge_v2') }}"
        owner: root
        group: root
        mode: "0755"
      become: true
      when: bv2_binary_changed

    # If the unit file isn't installed yet (first migration run from
    # the docker-bridge era) the systemctl reload below would fail.
    # Make sure the bridge_host role's tasks run first; idempotent on
    # subsequent deploys.
    - name: Ensure bridge_host role applied (systemd unit installed)
      include_role:
        name: bridge_host

    - name: Reload bridge_v2 (tableflip re-exec; TCP_REPAIR keeps sessions)
      systemd:
        name: bridge_v2.service
        state: reloaded   # ExecReload=/bin/kill -HUP $MAINPID
      become: true
      when: bv2_binary_changed

    - name: Start bridge_v2 if not running (covers first-run / crash)
      systemd:
        name: bridge_v2.service
        state: started
      become: true

    - name: Wait for bridge_v2 to accept connections
      wait_for:
        host: 127.0.0.1
        port: "{{ item }}"
        state: started
        timeout: 30
      loop:
        - 1337
        - 1986
        - 2026

    # ── everyone else ────────────────────────────────────────────────
    - name: Bring up non-bridge services (recreate only on image change)
      # Explicit service list — bridge_v2 isn't in docker anymore (it's
      # a host systemd service handled above). `--pull always` belt-
      # and-suspenders the earlier compose pull: if a tag floated
      # between then and now, we get the latest digest.
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} \
          up -d --pull always --remove-orphans \
          neohabitatmongo neohabitat bots otel-collector promtail
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      register: compose_up
      changed_when: "'Recreated' in compose_up.stderr or 'Started' in compose_up.stderr"

    - name: Force-recreate monitoring sidecars every deploy
      # Compose can't tell when a bind-mounted config file (otel-collector
      # config, promtail config) changes content, so changes to those land
      # via git but never get applied until the container is recreated.
      # Sidecars are stateless and restart in <5s, so just always recreate.
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} \
          up -d --force-recreate --no-deps otel-collector promtail
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      changed_when: true

    - name: Recreate bots if bots.env changed (so sage picks up the new key)
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} \
          up -d --force-recreate --no-deps bots
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      when: bots_env_file is defined and bots_env_file.changed
      changed_when: true

    - name: Show what the compose up did
      debug:
        msg: "{{ compose_up.stderr_lines | default([]) }}"

    - name: Final container status
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} ps
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      register: compose_ps
      changed_when: false

    - name: Container status output
      debug:
        msg: "{{ compose_ps.stdout_lines }}"

    - name: Deploy summary
      debug:
        msg:
          - "bridge_v2: {{ 'SIGHUP\\'d (sessions preserved)' if bv2_binary_changed else 'unchanged, no re-exec' }}"
          - "mongo / neohabitat / bots: handled by compose up (see lines above for what got recreated)"
