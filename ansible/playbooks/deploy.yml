---
# Steady-state deploy: pull the latest GHCR images, then surgically
# update each service:
#   - bridge_v2: extract the new binary from the pulled image, atomically
#     replace volumes/bridge_v2_bin/bridge_v2, SIGHUP the running container.
#     tableflip + TCP_REPAIR preserve active C64 sessions across the swap.
#   - everyone else: `docker compose up -d` only on those services, which
#     recreates only when their image digest actually changed.
#
# Used by the build-and-push GitHub Actions workflow on master push,
# after the build matrix succeeds.

- name: Deploy latest GHCR images to neohabitat hosts
  hosts: neohabitat_servers
  gather_facts: true
  any_errors_fatal: true
  vars:
    bridge_image: "ghcr.io/{{ ghcr_image_owner | default('frandallfarmer') }}/neohabitat-bridge:latest"
    bridge_container_name: neohabitat-bridge_v2-1
    bridge_listen_port: 2026
    bridge_bin_host_path: "{{ neohabitat_repo_path }}/volumes/bridge_v2_bin/bridge_v2"
    # Picked up from the runner's env. Multi-line secrets via -e are
    # fragile (newlines mangle); env-var lookup avoids that entirely.
    monitoring_env: "{{ lookup('env', 'MONITORING_ENV') | default('', true) }}"
    # Single-value: the Anthropic API key sage uses for LLM calls.
    anthropic_api_key: "{{ lookup('env', 'ANTHROPIC_API_KEY') | default('', true) }}"
  tasks:
    # If somebody has been hand-editing files on the box (the made has
    # historically lived this way), `ansible.builtin.git` with force=false
    # refuses to overwrite. force=true alone would silently nuke the
    # changes. Instead: snapshot anything dirty onto a saved-<UTC>
    # branch first, then pull cleanly.
    - name: Check for local modifications in the deploy repo
      command: git status --porcelain
      args:
        chdir: "{{ neohabitat_repo_path }}"
      register: deploy_repo_dirty
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ neohabitat_owner }}"

    - name: Snapshot local modifications to a saved-<UTC> branch
      shell: |
        set -euo pipefail
        branch="saved-$(date -u +%Y%m%dT%H%M%SZ)"
        echo "Saving local mods to ${branch}"
        git checkout -b "${branch}"
        git add -A
        git -c user.email='deploy@themade' -c user.name='ansible-deploy' \
          commit -m "auto-saved local modifications before deploy"
        # Hop back to the deploy ref so the next git task can fast-forward.
        # Use -f because a partially applied checkout could otherwise refuse.
        git checkout -f "{{ neohabitat_git_ref }}"
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      when:
        - deploy_repo_dirty.stdout is defined
        - deploy_repo_dirty.stdout | length > 0
      become: true
      become_user: "{{ neohabitat_owner }}"

    - name: Pull latest repo (so new compose files are present)
      git:
        repo: "{{ neohabitat_repo_url }}"
        dest: "{{ neohabitat_repo_path }}"
        version: "{{ neohabitat_git_ref }}"
        update: true
        # Safe to force: any local diffs were branched off in the
        # snapshot task above. force=false here just made the deploy
        # fail loudly every time someone edited a file on the host.
        force: true
      become: true
      become_user: "{{ neohabitat_owner }}"

    - name: Login to GHCR (only when packages are still private)
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_token }}"
      become: true
      when:
        - ghcr_username is defined
        - ghcr_token is defined
        - ghcr_token | length > 0

    # ── monitoring credentials (Grafana Cloud OTLP + Loki) ───────────
    # The MONITORING_ENV secret is the literal contents of the .env file
    # (multi-line, one VAR=value per line). When unset, leave any
    # existing file alone — sidecars will keep using whatever's there or
    # log loudly if it's missing.
    - name: Ensure /etc/neohabitat directory
      file:
        path: /etc/neohabitat
        state: directory
        owner: "{{ neohabitat_owner }}"
        group: "{{ neohabitat_group }}"
        mode: "0750"
      become: true
      when: >
        (monitoring_env is defined and monitoring_env | length > 0) or
        (anthropic_api_key is defined and anthropic_api_key | length > 0)

    - name: Write /etc/neohabitat/monitoring.env from CI secret
      copy:
        dest: /etc/neohabitat/monitoring.env
        content: "{{ monitoring_env }}"
        owner: "{{ neohabitat_owner }}"
        group: "{{ neohabitat_group }}"
        mode: "0600"
      become: true
      when: monitoring_env is defined and monitoring_env | length > 0
      register: monitoring_env_file
      no_log: true   # don't leak secrets into job logs

    # ── bots credentials (sage's Anthropic key + future bot keys) ─────
    - name: Write /etc/neohabitat/bots.env from CI secret
      copy:
        dest: /etc/neohabitat/bots.env
        content: |
          ANTHROPIC_API_KEY={{ anthropic_api_key }}
        owner: "{{ neohabitat_owner }}"
        group: "{{ neohabitat_group }}"
        mode: "0600"
      become: true
      when: anthropic_api_key is defined and anthropic_api_key | length > 0
      register: bots_env_file
      no_log: true

    - name: Pull latest compose images
      community.docker.docker_compose_v2:
        project_src: "{{ neohabitat_repo_path }}"
        files: "{{ neohabitat_compose_files }}"
        pull: always
        state: present
      become: true
      changed_when: false

    # ── bridge_v2 hot-swap ────────────────────────────────────────────
    # The prod overlay mounts the binary from volumes/bridge_v2_bin/
    # (NOT the image's baked-in /bridge_v2). To pick up a new build, we
    # have to copy the binary out of the just-pulled image, replace the
    # on-disk file, then SIGHUP. tableflip re-execs into the new binary
    # and TCP_REPAIR hands active sockets to the child.

    - name: Extract bridge_v2 binary from the new GHCR image
      shell: |
        set -euo pipefail
        cid=$(docker create {{ bridge_image }})
        trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
        docker cp "$cid:/bridge_v2" {{ bridge_bin_host_path }}.new
      args:
        executable: /bin/bash   # need pipefail; default /bin/sh is dash on Ubuntu
      become: true
      changed_when: false

    - name: Compute checksums of current and new bridge_v2 binaries
      stat:
        path: "{{ item }}"
        checksum_algorithm: sha256
      loop:
        - "{{ bridge_bin_host_path }}"
        - "{{ bridge_bin_host_path }}.new"
      register: bv2_stats
      become: true

    - name: Decide whether bridge_v2 needs a SIGHUP
      set_fact:
        bv2_binary_changed: "{{ (bv2_stats.results[0].stat.checksum | default('')) != (bv2_stats.results[1].stat.checksum | default('')) }}"

    - name: Atomically replace bridge_v2 binary (only if changed)
      command: mv -f "{{ bridge_bin_host_path }}.new" "{{ bridge_bin_host_path }}"
      become: true
      when: bv2_binary_changed
      changed_when: true

    - name: Drop staged binary if no change
      file:
        path: "{{ bridge_bin_host_path }}.new"
        state: absent
      become: true
      when: not bv2_binary_changed

    - name: Ensure bridge_v2 binary ownership/perms
      file:
        path: "{{ bridge_bin_host_path }}"
        owner: "{{ neohabitat_owner }}"
        group: "{{ neohabitat_group }}"
        mode: "0755"
      become: true
      when: bv2_binary_changed

    - name: SIGHUP bridge_v2 (tableflip re-exec; TCP_REPAIR keeps sessions)
      # `docker exec ... kill` doesn't work — the bridge image is
      # distroless and has no kill binary. `docker kill --signal` sends
      # the signal via the Docker API, no in-container binary needed.
      command: docker kill --signal=HUP {{ bridge_container_name }}
      become: true
      when: bv2_binary_changed
      changed_when: true

    - name: Wait for bridge_v2 to accept connections after SIGHUP
      wait_for:
        host: 127.0.0.1
        port: "{{ bridge_listen_port }}"
        state: started
        timeout: 30
      when: bv2_binary_changed

    # ── everyone else ────────────────────────────────────────────────
    - name: Bring up non-bridge services (recreate only on image change)
      # Explicit service list excludes bridge_v2, which we've just
      # SIGHUP-handled above. Without the exclusion, compose would
      # recreate bridge_v2's container, defeating tableflip.
      # `--pull always` belt-and-suspenders the earlier compose pull —
      # if a tag floated between then and now, we get the latest digest.
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} \
          up -d --pull always --remove-orphans \
          neohabitatmongo neohabitat bots otel-collector promtail
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      register: compose_up
      changed_when: "'Recreated' in compose_up.stderr or 'Started' in compose_up.stderr"

    - name: Force-recreate monitoring sidecars every deploy
      # Compose can't tell when a bind-mounted config file (otel-collector
      # config, promtail config) changes content, so changes to those land
      # via git but never get applied until the container is recreated.
      # Sidecars are stateless and restart in <5s, so just always recreate.
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} \
          up -d --force-recreate --no-deps otel-collector promtail
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      changed_when: true

    - name: Recreate bots if bots.env changed (so sage picks up the new key)
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} \
          up -d --force-recreate --no-deps bots
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      when: bots_env_file is defined and bots_env_file.changed
      changed_when: true

    - name: Show what the compose up did
      debug:
        msg: "{{ compose_up.stderr_lines | default([]) }}"

    - name: Final container status
      shell: |
        set -euo pipefail
        docker compose {{ neohabitat_compose_files | map('regex_replace', '^', '-f ') | join(' ') }} ps
      args:
        chdir: "{{ neohabitat_repo_path }}"
        executable: /bin/bash
      become: true
      register: compose_ps
      changed_when: false

    - name: Container status output
      debug:
        msg: "{{ compose_ps.stdout_lines }}"

    - name: Deploy summary
      debug:
        msg:
          - "bridge_v2: {{ 'SIGHUP\\'d (sessions preserved)' if bv2_binary_changed else 'unchanged, no re-exec' }}"
          - "mongo / neohabitat / bots: handled by compose up (see lines above for what got recreated)"
