# Dev overlay — adds bridge_v2 with Air hot-reload.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# (dev.sh does this automatically)
#
# Production uses bridge_v2 as a host systemd service (ansible/roles/bridge_host/).
# This file is never loaded in prod — Ansible uses docker-compose.prod.yml only.

services:
  bridge_v2:
    build:
      context: ./bridge_v2
      dockerfile: Dockerfile.dev
    command: ["air"]
    # Repo-local .env (see .env.example). Picks up any bridge-relevant
    # overrides (log levels, debug flags) without compose edits.
    env_file:
      - path: .env
        required: false
    environment:
      OTEL_SERVICE_NAME: "bridge_v2"
      NEOHABITAT_ORIGINAL_HATCHERY: "true"
    volumes:
      - ./bridge_v2:/app
    ports:
      - "2026:2026"
      - "2027:2027"
    # cap_add: [NET_ADMIN] and security_opt: [seccomp:unconfined] come from
    # docker-compose.override.yml's bridge_v2 (always merged into the dev project). Compose
    # concatenates list fields across files, and duplicate security_opt items are now a hard
    # validation error ("items at 0 and 1 are equal"), so they must NOT be repeated here.
    networks:
      - neohabitat
    depends_on:
      neohabitatmongo:
        condition: service_healthy
      neohabitat:
        condition: service_healthy
