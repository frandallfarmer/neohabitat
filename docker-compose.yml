networks:
  neohabitat:
    external: false

services:
  neohabitatmongo:
    # Pin to 7.0 — the data on disk has featureCompatibilityVersion=7.0,
    # and mongo 8.x refuses to start against it without an FCV bump done
    # by 8.0 first. Stay on 7.0 until we want to do that migration.
    # `:latest` previously silently jumped from 7 → 8 mid-deploy, which
    # is exactly what we're avoiding.
    image: mongodb/mongodb-community-server:7.0-ubuntu2204
    restart: unless-stopped
    ports:
      - "27017:27017"
    # Production persists data via host bind mount to ./data/mongo (set in
    # docker-compose.prod.yml). In dev / CI we use an anonymous volume —
    # nothing to chown, nothing to clean up.
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.stats()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - neohabitat

  neohabitat:
    # Production pulls this from GHCR (built and pushed by
    # .github/workflows/build-and-push.yml on every master push).
    # `build:` is kept so CI's compose-smoke job and local devs can still
    # build from source on demand. Compose uses the local image if present;
    # ansible/production does `pull: always` so GHCR wins.
    image: ghcr.io/frandallfarmer/neohabitat:latest
    build: .
    restart: unless-stopped
    environment:
      - NEOHABITAT_MONGO_HOST=neohabitatmongo:27017
      - NEOHABITAT_SHOULD_ENABLE_DEBUGGER
      - NEOHABITAT_SHOULD_RUN_BRIDGE=false
      - NEOHABITAT_SHOULD_RUN_NEOHABITAT=true
      - NEOHABITAT_SHOULD_RUN_PUSHSERVER=true
      - NEOHABITAT_SHOULD_UPDATE_SCHEMA
      - NEOHABITAT_SERVER_HOST=neohabitat
      - NEOHABITAT_SERVER_PORT=1337
      - HABIPROXY_ELKO_HOST=neohabitat
      - HABIPROXY_ELKO_PORT=9000
      - NODE_ENV=development
      - PUSH_SERVER_CONFIG=./config.dev.yml
      - PUSH_SERVER_MONGO_URL=mongodb://neohabitatmongo
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1701"]
      interval: 30s
      timeout: 10s
      retries: 10
      # Schema rebuild + JVM warmup can take ~30-60s on a cold start.
      start_period: 90s
    ports:
      - "1701:1701"
      - "1987:1987"
      - "5005:5005"
    depends_on:
      neohabitatmongo:
        condition: service_healthy
    networks:
      - neohabitat

  bridge_v2:
    image: ghcr.io/frandallfarmer/neohabitat-bridge:latest
    build:
      context: ./bridge_v2
      dockerfile: Dockerfile.dev
    command: ["air"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "bridge_v2"
    volumes:
      - ./bridge_v2:/app
    ports:
      - "1337:2026"
      - "1986:2026"  # legacy QLink port — clients hard-code this; bridge_v2's --qlink mode handles it
      - "2026:2026"
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    depends_on:
      neohabitatmongo:
        condition: service_healthy
      neohabitat:
        condition: service_healthy
    networks:
      - neohabitat

  bots:
    image: ghcr.io/frandallfarmer/neohabitat-bots:latest
    build:
      context: ./habibots
    restart: unless-stopped
    environment:
      - HABIBOTS_HOST=bridge_v2
      - HABIBOTS_PORT=2026
    env_file:
      # Carries ANTHROPIC_API_KEY (and any future bot-specific creds).
      # required: false so the stack still comes up before the deploy
      # job has written the file; sage will exit on startup if the key
      # is missing, but the other bots keep running.
      - path: /etc/neohabitat/bots.env
        required: false
    depends_on:
      neohabitat:
        condition: service_healthy
      bridge_v2:
        condition: service_started
    networks:
      - neohabitat
    entrypoint: ['/habibots/run']
    command: ['hatchery', 'eliza', 'sage']
