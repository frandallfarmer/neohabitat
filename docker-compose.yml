networks:
  neohabitat:
    external: false

services:
  neohabitatmongo:
    image: mongodb/mongodb-community-server:latest
    ports:
      - "27017:27017"
    # Persist mongo data on the host so `docker compose down` doesn't drop
    # the elko DB. Was an anonymous volume previously, which compose
    # silently destroyed on `down`.
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.stats()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - neohabitat

  neohabitat:
    build: .
    restart: unless-stopped
    # The dev bind-mount (`.:/neohabitat`) lives in docker-compose.override.yml
    # so that `docker compose -f docker-compose.yml ...` (CI) gets the image
    # exactly as built, with its baked-in node_modules and jar intact.
    # Local `docker compose up` (no -f) auto-loads the override and gets
    # live source editing.
    image: frandallfarmer/neohabitat
    environment:
      - NEOHABITAT_MONGO_HOST=neohabitatmongo:27017
      - NEOHABITAT_SHOULD_ENABLE_DEBUGGER
      - NEOHABITAT_SHOULD_RUN_BRIDGE=false
      - NEOHABITAT_SHOULD_RUN_NEOHABITAT=true
      - NEOHABITAT_SHOULD_RUN_PUSHSERVER=true
      - NEOHABITAT_SHOULD_UPDATE_SCHEMA
      - NEOHABITAT_SERVER_HOST=neohabitat
      - NEOHABITAT_SERVER_PORT=1337
      - HABIPROXY_ELKO_HOST=neohabitat
      - HABIPROXY_ELKO_PORT=9000
      - NODE_ENV=development
      - PUSH_SERVER_CONFIG=./config.dev.yml
      - PUSH_SERVER_MONGO_URL=mongodb://neohabitatmongo
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1701"]
      interval: 30s
      timeout: 10s
      retries: 10
      # Schema rebuild + JVM warmup can take ~30-60s on a cold start.
      start_period: 90s
    ports:
      - "1701:1701"
      - "1987:1987"
      - "5005:5005"
    depends_on:
      neohabitatmongo:
        condition: service_healthy
    networks:
      - neohabitat

  bridge_v2:
    build:
      context: ./bridge_v2
      dockerfile: Dockerfile.dev
    command: ["air"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "bridge_v2"
    volumes:
      - ./bridge_v2:/app
    ports:
      - "1337:2026"
      - "2026:2026"
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    depends_on:
      neohabitatmongo:
        condition: service_healthy
      neohabitat:
        condition: service_healthy
    networks:
      - neohabitat

  bots:
    build:
      context: ./habibots
    environment:
      - HABIBOTS_HOST=bridge_v2
      - HABIBOTS_PORT=2026
    depends_on:
      neohabitat:
        condition: service_healthy
      bridge_v2:
        condition: service_started
    networks:
      - neohabitat
    entrypoint: ['/habibots/run']
    command: ['hatchery', 'eliza']
