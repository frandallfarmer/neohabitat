networks:
  neohabitat:
    external: false

services:
  neohabitatmongo:
    image: mongodb/mongodb-community-server:latest
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.stats()"]
      interval: 30s
      timeout: 30s
      retries: 30
    networks:
      - neohabitat

  neohabitat:
    build: .
    restart: unless-stopped
    volumes:
      - .:/neohabitat
    # make sure to build this with `docker compose build` when doing development to compile your local changes.
    image: frandallfarmer/neohabitat
    environment:
      - NEOHABITAT_MONGO_HOST=neohabitatmongo:27017
      - NEOHABITAT_SHOULD_ENABLE_DEBUGGER
      - NEOHABITAT_SHOULD_RUN_BRIDGE=false
      - NEOHABITAT_SHOULD_RUN_NEOHABITAT=true
      - NEOHABITAT_SHOULD_RUN_PUSHSERVER=true
      - NEOHABITAT_SHOULD_UPDATE_SCHEMA
      - NEOHABITAT_SERVER_HOST=neohabitat
      - NEOHABITAT_SERVER_PORT=1337
      - HABIPROXY_ELKO_HOST=neohabitat
      - HABIPROXY_ELKO_PORT=9000
      - NODE_ENV=development
      - PUSH_SERVER_CONFIG=./config.dev.yml
      - PUSH_SERVER_MONGO_URL=mongodb://neohabitatmongo
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1701"]
      interval: 30s
      timeout: 30s
      retries: 30
    ports:
      - "1701:1701"
      - "1987:1987"
      - "5005:5005"
    depends_on:
      neohabitatmongo:
        condition: service_healthy
    networks:
      - neohabitat

  bridge_v2:
    build: ./bridge_v2
    restart: unless-stopped
    # Runs in Habilink/QLink mode (see bridge_v2/bridge/qlink_session.go).
    # Speaks the JSON-name preamble + QLink wire protocol that real C64
    # clients (and the qlink service in this stack) emit. Drop the --qlink
    # flag to fall back to the legacy colon-prefix protocol.
    command:
      - "--qlink"
      - "--listen=0.0.0.0:2026"
      - "--elko.host=neohabitat:2018"
      - "--mongo.host=mongodb://neohabitatmongo:27017"
      - "--mongo.db=elko"
      - "--mongo.collection=odb"
      - "--context=context-hatchery"
      - "--rate=1200"
      - "--log.level=DEBUG"
    ports:
      - "1337:2026"
    depends_on:
      neohabitatmongo:
        condition: service_healthy
      neohabitat:
        condition: service_healthy
    networks:
      - neohabitat

  bots:
    build:
      context: ./habibots
    environment:
      - HABIBOTS_HOST=bridge_v2
      - HABIBOTS_PORT=2026
    depends_on:
      neohabitat:
        condition: service_healthy
      bridge_v2:
        condition: service_started
    networks:
      - neohabitat
    entrypoint: ['/habibots/run']
    command: ['hatchery', 'eliza']
