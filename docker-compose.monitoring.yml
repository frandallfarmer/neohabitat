# Monitoring overlay — adds otel-collector + promtail, both shipping to
# Grafana Cloud. Loaded by the made's compose stack alongside the base
# and prod compose files (see ansible/inventory/group_vars/all.yml ::
# neohabitat_compose_files).
#
# Credentials live on the host at /etc/neohabitat/monitoring.env (chmod
# 600, owned by themade). The ansible role renders that file from a
# vaulted template; for first-time setup, drop it in by hand.
#
# .env file format:
#   GRAFANA_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-0.grafana.net/otlp
#   GRAFANA_OTLP_AUTH=Basic <base64(instance-id:api-key)>
#   GRAFANA_LOKI_URL=https://logs-prod-006.grafana.net/loki/api/v1/push
#   GRAFANA_LOKI_USERNAME=<loki instance id>
#   GRAFANA_LOKI_API_KEY=<api key with MetricsPublisher role>

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    restart: unless-stopped
    env_file:
      # required: false so the stack still comes up if creds aren't on
      # the box yet — otel-collector will just fail-loop in its own logs.
      - path: /etc/neohabitat/monitoring.env
        required: false
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      # OTLP/HTTP exposed to 127.0.0.1 so the host-side bridge_v2
      # systemd service can ship metrics here. Loopback only — public
      # exposure of the collector would let anyone push junk metrics
      # against our Grafana Cloud quota.
      - "127.0.0.1:4318:4318"
    networks:
      - neohabitat

  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    env_file:
      - path: /etc/neohabitat/monitoring.env
        required: false
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # bridge_v2 logs to journald now (it's a host systemd service).
      # Persistent journal storage lives in /var/log/journal on this
      # host — /run/log/journal is volatile/unused. Mount the persistent
      # path so promtail's journal scraper can read it across reboots.
      # /etc/machine-id is required by libsystemd for journal-id
      # resolution; without it the reader silently sees zero entries.
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - promtail-positions:/tmp
    networks:
      - neohabitat

volumes:
  promtail-positions:
