# Production compose overlay — extends docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# bridge_v2 used to live in this file with a volume-mounted binary +
# tableflip SIGHUP for zero-downtime upgrades. It now runs as a host
# systemd service (ansible/roles/bridge_host/) — Docker treats PID 1
# exit as container death, which broke tableflip's fork+exec graceful
# upgrade. Running on the host, tableflip works as designed; the
# binary is replaced under /opt/neohabitat/bin/ and `systemctl reload`
# trips a SIGHUP-driven re-exec.

services:
  neohabitatmongo:
    # Persist the elko DB on the host so `docker compose down` can't
    # silently drop it (anonymous volumes get destroyed on `down`).
    # Lives only in prod overlay because in dev/CI we want compose to
    # auto-create an empty data dir without us having to chown it to
    # the in-container mongo uid.
    volumes:
      - ./data/mongo:/data/db

  neohabitat:
    # Production overrides for the elko + pushserver container:
    #   - run pushserver in production mode with config.prod.yml
    #   - publish pushserver as host :80 (the made fronts public HTTP this way)
    environment:
      - NODE_ENV=production
      - PUSH_SERVER_CONFIG=./config.prod.yml
    ports:
      - "80:1701"
      - "1987:1987"
      - "127.0.0.1:5005:5005"
      # Habiproxy on 127.0.0.1:2018 — same as base. Re-asserted here
      # so the prod overlay's port list (which compose REPLACES rather
      # than merges) doesn't accidentally drop it.
      - "127.0.0.1:2018:2018"

  caddy:
    # HTTPS front on host :443 (see caddy/Caddyfile). Terminates TLS via Let's Encrypt
    # (TLS-ALPN-01 on 443 — NOT HTTP-01, since the neohabitat container owns host :80),
    # reverse-proxies the Alpha webclient + the game WebSocket to the neohabitat container,
    # and 302-redirects everything else to the existing HTTP site. Prod-only: dev/CI never
    # publishes 443 or needs a public cert.
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - neohabitat
    ports:
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # persists the issued cert across redeploys (LE rate limits)
      - caddy_config:/config
    networks:
      - neohabitat

volumes:
  caddy_data:
  caddy_config:
