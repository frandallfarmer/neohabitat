# Production compose overlay — extends docker-compose.yml with:
#   - tableflip graceful restart (--graceful flag, volume-mounted binary)
#   - CRIU checkpoint/restore support for live migration
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Code update (zero-downtime):
#   1. Build: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o deploy/bridge_v2 ./bridge_v2/
#   2. Replace: cp deploy/bridge_v2 volumes/bridge_v2_bin/bridge_v2
#   3. Reload: docker exec neohabitat-bridge_v2-1 kill -HUP 1
#   tableflip re-execs the new binary. Old sessions drain, new sessions
#   get new code.
#
# Host migration (CRIU):
#   1. Checkpoint: docker checkpoint create neohabitat-bridge_v2-1 migr1
#   2. Export:     tar -C /var/lib/docker/containers/<id>/checkpoints -cf migr1.tar migr1
#   3. Transfer:   scp migr1.tar target-host:
#   4. Import:     tar -C /var/lib/docker/containers/<id>/checkpoints -xf migr1.tar
#   5. Restore:    docker start --checkpoint migr1 neohabitat-bridge_v2-1
#   All TCP connections, Go runtime state, and session data survive.

services:
  neohabitat:
    # Production overrides for the elko + pushserver container:
    #   - run pushserver in production mode with config.prod.yml
    #   - publish pushserver as host :80 (the made fronts public HTTP this way)
    environment:
      - NODE_ENV=production
      - PUSH_SERVER_CONFIG=./config.prod.yml
    ports:
      - "80:1701"
      - "1987:1987"
      - "5005:5005"

  bridge_v2:
    # Override the baked-in binary with a volume mount so tableflip
    # can re-exec a replaced binary without rebuilding the image.
    volumes:
      - ./volumes/bridge_v2_bin:/app
    entrypoint: ["/app/bridge_v2"]
    command:
      - "--graceful"
      - "--qlink"
      - "--listen=0.0.0.0:2026"
      - "--elko.host=neohabitat:2018"
      - "--mongo.host=mongodb://neohabitatmongo:27017"
      - "--mongo.db=elko"
      - "--mongo.collection=odb"
      - "--context=context-hatchery"
      - "--rate=1200"
      - "--log.level=INFO"
    # CRIU needs these capabilities to checkpoint/restore processes.
    user: "0"
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    # Don't let Docker restart kill a draining parent — it'll exit
    # on its own once sessions close.
    restart: "no"
