---
name: build-and-push

# CI for the neohabitat repo. Replaces the old Travis pipeline.
#
#   1. go-test       — `go test ./...` on bridge_v2 (Linux-only syscalls).
#   2. compose-smoke — `docker compose build && up -d`, port reachability,
#                      then `down`. Catches "stack doesn't even come up".
#   3. build         — matrix-builds the three images. Pushes to GHCR on
#                      master / v* tags. Gated on the two test jobs.
#
# Images:
#   ghcr.io/<owner>/neohabitat          (Dockerfile at repo root — elko + bridge + pushserver)
#   ghcr.io/<owner>/neohabitat-bots     (habibots/Dockerfile)
#   ghcr.io/<owner>/neohabitat-bridge   (bridge_v2/Dockerfile — distroless Go binary)

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: bridge_v2/go.mod
          cache-dependency-path: bridge_v2/go.sum

      - name: go vet
        working-directory: bridge_v2
        run: go vet ./...

      - name: go test
        working-directory: bridge_v2
        run: go test -race -count=1 ./...

  compose-smoke:
    # Real-world "does the stack even come up" check. Builds all three
    # images locally (no GHCR push), starts the dev compose, waits for
    # health, then tears down.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build compose stack
        run: docker compose -f docker-compose.yml build --pull

      - name: Bring stack up
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for ports
        # Smokes the docker stack only — bridge_v2 lives on the host as a
        # systemd service since 35c554d7 and is not part of the compose
        # bringup. mongo (27017), pushserver (1701), and pushserver's
        # admin port (1987) are what's left in the compose graph that
        # bind to host ports. The elko server takes ~30-60s on a cold
        # start because it builds the schema; poll generously.
        run: |
          set -euo pipefail
          for port in 27017 1701; do
            echo "Waiting for :$port..."
            for i in $(seq 1 90); do
              if nc -z -w 2 127.0.0.1 "$port"; then
                echo "  :$port reachable"
                break
              fi
              sleep 2
              if [ "$i" -eq 90 ]; then
                echo "  :$port never came up" >&2
                docker compose -f docker-compose.yml ps
                docker compose -f docker-compose.yml logs --tail=200
                exit 1
              fi
            done
          done

      - name: Container status
        if: always()
        run: docker compose -f docker-compose.yml ps

      - name: Stack logs (last 100 lines per service)
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=100

      - name: Bring stack down
        if: always()
        run: docker compose -f docker-compose.yml down --volumes --remove-orphans

  build:
    needs: [go-test, compose-smoke]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: neohabitat
            context: .
            dockerfile: Dockerfile
          - name: neohabitat-bots
            context: .
            dockerfile: habibots/Dockerfile
          - name: neohabitat-bridge
            context: ./bridge_v2
            dockerfile: bridge_v2/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # Login is only needed when we're going to push. Skip on PRs from
      # forks (which don't have access to packages:write anyway).
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build${{ github.event_name != 'pull_request' && ' and push' || '' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false

  deploy:
    # Pulls the freshly-pushed GHCR images onto the made and recreates any
    # service whose image digest changed. Runs only on master pushes, after
    # all three image builds succeed.
    #
    # Required secrets (GitHub repo → Settings → Secrets and variables → Actions):
    #   SSH_DEPLOY_KEY  — private ed25519 key whose pub is in themade@20.3.249.92
    #                     authorized_keys (also added to themade_authorized_keys
    #                     in inventory/group_vars/all.yml so the base role keeps it).
    #   GHCR_PULL_TOKEN — PAT with read:packages, used for `docker login ghcr.io`
    #                     on the made (only needed while GHCR packages are private).
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    concurrency:
      group: deploy-the-made
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Install ansible + collections
        run: |
          set -euo pipefail
          python3 -m pip install --quiet ansible-core
          ansible-galaxy collection install \
            community.general community.docker ansible.posix

      - name: Write SSH deploy key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh ~/.ssh/cm   # cm/ is for ansible.cfg's ControlPath
          chmod 700 ~/.ssh
          printf '%s' "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 20.3.249.92 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run ansible deploy
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "True"
          # MONITORING_ENV is the literal contents of /etc/neohabitat/monitoring.env
          # (multi-line, GRAFANA_OTLP_ENDPOINT/AUTH + GRAFANA_LOKI_*).
          # When unset, the deploy task no-ops on it.
          MONITORING_ENV: ${{ secrets.MONITORING_ENV }}
          # ANTHROPIC_API_KEY is sage's LLM credential. Deploy writes it
          # into /etc/neohabitat/bots.env which the bots compose service
          # reads via env_file. When unset, sage exits at startup; the
          # other bots keep running.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # DISCORD_WEBHOOK_LOGINS is the themade.org Discord webhook for
          # bridge_v2's login alerts. Deploy writes it into
          # /etc/neohabitat/alerts.env (bridge_v2 systemd EnvironmentFile).
          # When unset, alerts are disabled — the dev/default state.
          DISCORD_WEBHOOK_LOGINS: ${{ secrets.DISCORD_WEBHOOK_LOGINS }}
          # DISCORD_WEBHOOK_ORACLE_REQUESTS receives ASK/WISH speech aimed at
          # oracular objects (fountain, crystal ball, genie) so operators can
          # play Oracle. Same alerts.env delivery as the logins webhook.
          DISCORD_WEBHOOK_ORACLE_REQUESTS: ${{ secrets.DISCORD_WEBHOOK_ORACLE_REQUESTS }}
        run: |
          export ANSIBLE_SSH_KEY="$HOME/.ssh/deploy_key"
          # MONITORING_ENV is read by the playbook via lookup('env',...);
          # passing it via -e would break on its newlines.
          ansible-playbook \
            -i inventory/production.yml \
            -e ghcr_username=${{ github.actor }} \
            -e ghcr_token=${{ secrets.GHCR_PULL_TOKEN }} \
            playbooks/deploy.yml

  deploy-dashboards:
    # Pushes every monitoring/grafana/dashboards/*.json to Grafana Cloud
    # via the HTTP API. `overwrite: true` so re-pushes update in-place
    # rather than creating duplicates (uid in the dashboard JSON is the
    # stable identifier).
    #
    # Required secrets:
    #   GRAFANA_URL    — https://<your-stack>.grafana.net (the Grafana
    #                    instance URL, NOT prometheus/loki/tempo URLs)
    #   GRAFANA_TOKEN  — Grafana SERVICE-ACCOUNT token (Settings →
    #                    Service accounts → Add token) with the Editor
    #                    role. NOT a Grafana Cloud Access Policy token
    #                    (those `glc_*` tokens are for management APIs
    #                    and return 401 against /api/dashboards/db).
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Push dashboards to Grafana Cloud
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GRAFANA_URL:-}" ] || [ -z "${GRAFANA_TOKEN:-}" ]; then
            echo "::warning::GRAFANA_URL or GRAFANA_TOKEN not set — skipping dashboard push."
            exit 0
          fi

          # Sanity-check the token before iterating dashboards: hit a
          # cheap endpoint that requires auth and surface its response so
          # 401s tell us which kind of token / URL is wrong.
          echo "::group::auth check"
          # Grafana Cloud instances sleep when idle and answer the first
          # request(s) with HTTP 503 {"code":"Loading"} while they wake up —
          # and this auth check is itself what triggers the wake-up. So retry
          # transient states (503/502/504/429, or curl connection failures ->
          # 000) with backoff before concluding the token/URL is wrong. Only
          # 401/403 are genuine auth failures and fail fast.
          max_attempts=12
          attempt=1
          status=000
          while [ "$attempt" -le "$max_attempts" ]; do
            status=$(curl -sS -o /tmp/whoami.txt -w '%{http_code}' \
              -H "Authorization: Bearer $GRAFANA_TOKEN" \
              "$GRAFANA_URL/api/user" || true)
            echo "attempt $attempt/$max_attempts: GET $GRAFANA_URL/api/user -> HTTP $status"
            case "$status" in
              200)
                break
                ;;
              401|403)
                cat /tmp/whoami.txt 2>/dev/null; echo
                echo "::error::Auth check failed (HTTP $status). Confirm:"
                echo "  1) GRAFANA_URL is your Grafana instance URL (https://<stack>.grafana.net), NOT prometheus/loki/tempo."
                echo "  2) GRAFANA_TOKEN is a Grafana SERVICE-ACCOUNT token (Settings → Service accounts), NOT a Cloud Access Policy 'glc_*' token."
                echo "  3) The service account has the Editor role."
                exit 1
                ;;
              *)
                # Transient: instance still waking / rate-limited / no HTTP
                # response yet. Back off and retry.
                sleep_s=$(( attempt < 6 ? 10 : 20 ))
                echo "  transient response (HTTP $status); waking instance, retrying in ${sleep_s}s..."
                sleep "$sleep_s"
                ;;
            esac
            attempt=$((attempt + 1))
          done

          if [ "$status" != "200" ]; then
            cat /tmp/whoami.txt 2>/dev/null; echo
            if grep -qi 'loading' /tmp/whoami.txt 2>/dev/null; then
              echo "::warning::Grafana instance still loading (HTTP $status) after $max_attempts attempts — skipping dashboard push this run; it will retry on the next push to master."
              exit 0
            fi
            echo "::error::Grafana auth check did not succeed after $max_attempts attempts (last HTTP $status); see the response body above."
            exit 1
          fi
          echo "auth check passed (HTTP 200)"
          echo "::endgroup::"

          # Build a placeholder→real datasource UID map. Dashboards in
          # this repo use placeholder UIDs ("prometheus", "loki", "tempo")
          # — we substitute the actual Grafana Cloud UIDs before pushing
          # so the same dashboard JSON works across any stack.
          echo "::group::datasource UID mapping"
          status=$(curl -sS -o /tmp/datasources.json -w '%{http_code}' \
            -H "Authorization: Bearer $GRAFANA_TOKEN" \
            "$GRAFANA_URL/api/datasources")
          echo "GET /api/datasources -> HTTP $status"

          if [ "$status" != "200" ]; then
            echo "Response body:"
            cat /tmp/datasources.json; echo
            echo "::error::Could not list datasources. The service-account token needs 'datasources:read' (Editor role usually has it; double-check in Settings → Service accounts → <name> → Permissions)."
            exit 1
          fi

          # The Editor role can return a plain {"message":"..."} on 200
          # in some Grafana versions when permissions don't allow viewing
          # secure fields. Verify we actually got an array.
          if [ "$(jq -r 'type' /tmp/datasources.json)" != "array" ]; then
            echo "Response was not an array (got $(jq -r 'type' /tmp/datasources.json)):"
            cat /tmp/datasources.json | jq . || cat /tmp/datasources.json
            exit 1
          fi

          echo "Datasources visible to the token:"
          jq -r '.[] | "  \(.type)\t\(.name)\t\(.uid)\(if .isDefault then "  [default]" else "" end)"' \
            /tmp/datasources.json

          # Grafana Cloud provisions multiple datasources of each type
          # (e.g. for `loki` you get both `grafanacloud-<stack>-logs` AND
          # `grafanacloud-<stack>-alert-state-history`). Picking arbitrarily
          # by type alone gave us the alert-state Loki, which is empty.
          # Prefer datasources whose NAME ends with the canonical suffix
          # for the signal we want; only fall back to "default of type"
          # then "first of type" if no name match exists.
          declare -A ds_map
          declare -A suffix_for=(
            [prometheus]=prom
            [loki]=logs
            [tempo]=traces
          )
          for placeholder in prometheus loki tempo; do
            suffix=${suffix_for[$placeholder]}
            real=$(jq -r --arg t "$placeholder" --arg sfx "-$suffix" \
              '[.[] | select(.type == $t)] as $matches
               | ($matches | map(select(.name | endswith($sfx))) | .[0])
                 // ($matches | map(select(.isDefault)) | .[0])
                 // ($matches | .[0])
               | .uid // empty' \
              /tmp/datasources.json)
            if [ -n "$real" ]; then
              # Also report which datasource NAME we picked so it's
              # obvious in the log when the wrong one wins.
              picked_name=$(jq -r --arg u "$real" \
                '.[] | select(.uid == $u) | .name' /tmp/datasources.json)
              ds_map[$placeholder]=$real
              echo "  $placeholder -> $real  ($picked_name)"
            else
              echo "  $placeholder -> (no datasource of that type; leaving placeholder)"
            fi
          done
          echo "::endgroup::"

          shopt -s nullglob
          dashboards=(monitoring/grafana/dashboards/*.json)
          if [ ${#dashboards[@]} -eq 0 ]; then
            echo "No dashboards to push."
            exit 0
          fi

          for d in "${dashboards[@]}"; do
            name=$(basename "$d" .json)
            uid=$(jq -r '.uid // empty' "$d")
            if [ -z "$uid" ]; then
              echo "::error file=$d::dashboard has no uid; refusing to push (would create a duplicate on every run)"
              exit 1
            fi

            echo "::group::push $name (uid=$uid)"

            # Rewrite placeholder datasource UIDs throughout the dashboard.
            remapped=$(cat "$d")
            for placeholder in "${!ds_map[@]}"; do
              real=${ds_map[$placeholder]}
              remapped=$(echo "$remapped" | jq --arg p "$placeholder" --arg r "$real" \
                'walk(if type == "object" and .uid == $p then .uid = $r else . end)')
            done

            payload=$(echo "$remapped" | jq --arg sha "${{ github.sha }}" \
              '{dashboard: (. | .id = null), folderUid: "", overwrite: true, message: ("ci: push from " + $sha)}')

            status=$(echo "$payload" | curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer $GRAFANA_TOKEN" \
              -H "Content-Type: application/json" \
              "$GRAFANA_URL/api/dashboards/db" \
              -d @-)
            echo "POST /api/dashboards/db -> HTTP $status"
            cat /tmp/resp.json | jq . || cat /tmp/resp.json
            if [ "$status" != "200" ]; then
              exit 1
            fi
            echo "::endgroup::"
          done
