# otel-collector receives OTLP from bridge_v2 (over HTTP at :4318) and
# ships:
#   - metrics → Grafana Cloud Prometheus via remote_write
#   - logs    → Grafana Cloud Loki  (also covered by promtail; this picks
#                 up anything bridge_v2 sends as OTLP logs that the docker
#                 log driver doesn't see)
#   - traces  → DISABLED until we add a Tempo endpoint (Grafana Cloud →
#                 Connections → Tempo → Send Traces. Add GCLOUD_TEMPO_URL
#                 + GCLOUD_TEMPO_ID to MONITORING_ENV and uncomment the
#                 traces pipeline + tempo exporter below).
#
# Required env vars (from /etc/neohabitat/monitoring.env, written by the
# CI deploy job from the MONITORING_ENV repo secret):
#   GCLOUD_HOSTED_METRICS_URL  e.g. https://prometheus-prod-XX-prod-us-east-N.grafana.net/api/prom/push
#   GCLOUD_HOSTED_METRICS_ID   numeric Prometheus instance id
#   GCLOUD_HOSTED_LOGS_URL     e.g. https://logs-prod-NNN.grafana.net/loki/api/v1/push
#   GCLOUD_HOSTED_LOGS_ID      numeric Loki instance id
#   GCLOUD_RW_API_KEY          glc_… key with metrics-publish + logs-publish

extensions:
  basicauth/grafana_metrics:
    client_auth:
      username: "${env:GCLOUD_HOSTED_METRICS_ID}"
      password: "${env:GCLOUD_RW_API_KEY}"
  basicauth/grafana_logs:
    client_auth:
      username: "${env:GCLOUD_HOSTED_LOGS_ID}"
      password: "${env:GCLOUD_RW_API_KEY}"

receivers:
  otlp:
    protocols:
      # Bind to the container's own hostname (docker writes it to
      # /etc/hosts against the bridge IP) instead of 0.0.0.0. Functionally
      # identical for our use — the container has no published ports —
      # but silences the v0.110 "Using the 0.0.0.0 address exposes this
      # server to every network interface" warning.
      http:
        endpoint: "otel-collector:4318"
      grpc:
        endpoint: "otel-collector:4317"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert
      - key: service.namespace
        value: neohabitat
        action: upsert

exporters:
  prometheusremotewrite/grafana_cloud:
    endpoint: "${env:GCLOUD_HOSTED_METRICS_URL}"
    auth:
      authenticator: basicauth/grafana_metrics

  loki/grafana_cloud:
    endpoint: "${env:GCLOUD_HOSTED_LOGS_URL}"
    auth:
      authenticator: basicauth/grafana_logs

  # No-op exporter for traces. Without a traces pipeline, the OTLP HTTP
  # receiver returns 404 on /v1/traces and bridge_v2 spams its logs with
  # export errors. Absorbing them here is harmless until we add a real
  # Tempo endpoint.
  nop:

  # Uncomment when GCLOUD_TEMPO_URL / GCLOUD_TEMPO_ID are added; remove
  # `nop` from the traces pipeline below at the same time.
  # otlphttp/grafana_tempo:
  #   endpoint: "${env:GCLOUD_TEMPO_URL}"
  #   auth:
  #     authenticator: basicauth/grafana_traces
  #   compression: gzip

service:
  extensions: [basicauth/grafana_metrics, basicauth/grafana_logs]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheusremotewrite/grafana_cloud]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [loki/grafana_cloud]
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [nop]
