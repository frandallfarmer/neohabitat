# promtail tails docker container logs and ships them to Grafana Cloud
# Loki. Reads ALL neohabitat-* containers (not just bridge_v2 like the
# old self-hosted setup did).
#
# Required env vars (from /etc/neohabitat/monitoring.env):
#   GCLOUD_HOSTED_LOGS_URL  e.g. https://logs-prod-NNN.grafana.net/loki/api/v1/push
#   GCLOUD_HOSTED_LOGS_ID   numeric Loki instance id
#   GCLOUD_RW_API_KEY       glc_… key (same one as metrics; needs logs-publish scope)

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${GCLOUD_HOSTED_LOGS_URL}
    basic_auth:
      username: ${GCLOUD_HOSTED_LOGS_ID}
      password: ${GCLOUD_RW_API_KEY}
    external_labels:
      cluster: the_made
      environment: production

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["neohabitat-.*"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        regex: '/(.*)'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
    pipeline_stages:
      # bridge_v2 logs are zerolog JSON — extract structured fields as
      # Loki labels so we can filter by ip/session/avatar/level.
      - match:
          selector: '{service="bridge_v2"}'
          stages:
            - json:
                expressions:
                  level: level
                  ip: ip
                  session_id: session_id
                  avatar: avatar
                  message: message
            - labels:
                level:
                ip:
                session_id:
                avatar:
