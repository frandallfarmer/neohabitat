---
viceJsUrl: https://sgeo.github.io/experimental/neohabitat-joystick/x64.js

# The Alpha web client (/webclient, /habisound, /habiworld) is now OPEN. It was gated because a
# fast client could overflow co-present C64 clients; that's resolved (Phase 7d wire pacing + the
# busy/wait cursor's co-presence delays). To re-gate, set alphaPassword to a shared secret here
# (pushserver/app.js alphaGate; unset = open).

# Force /webclient onto HTTPS (the Caddy front on :443). A plain-HTTP hit to /webclient 302s to the
# https URL so the client always runs in a secure context (habisound + wss). Prod-only — left unset
# in dev so local http://localhost serving isn't redirected. See pushserver/app.js forceHttps.
requireHttps: true

websocketProxy:
  clientAddr: habitat.themade.org:1987
  listenAddr: 0.0.0.0:1987
  remoteAddr: habitat.themade.org:1986

bridgeAdminAddr: host.docker.internal:2027

backgroundImages:
